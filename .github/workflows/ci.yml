name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          MAINLAYER_API_KEY: test-api-key
          RESOURCE_ID: res_test_ci
          PUBLIC_BASE_URL: http://testserver
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --asyncio-mode=auto

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/ client/

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agent-subscription-api:ci .

      - name: Smoke test container
        run: |
          docker run -d \
            --name api-smoke \
            -p 8000:8000 \
            -e MAINLAYER_API_KEY=test-key \
            -e RESOURCE_ID=res_ci_test \
            -e PUBLIC_BASE_URL=http://localhost:8000 \
            agent-subscription-api:ci
          sleep 5
          curl -f http://localhost:8000/health
          docker stop api-smoke
